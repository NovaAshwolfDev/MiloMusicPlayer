name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      description:
        description: 'Release description'
        required: false
        default: 'New release'
      debug:
        description: 'Debug mode (skip release)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && !inputs.debug   # optionally skip tag on debug
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish MiloMusicPlayer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Zip output
        if: github.event_name != 'workflow_dispatch' || !inputs.debug
        run: Compress-Archive -Path ./publish/* -DestinationPath ./MiloMusicPlayer-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}-win-x64.zip

      - name: Create Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.debug)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: ./MiloMusicPlayer-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}-win-x64.zip
          name: Milo Music Player ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          body: ${{ github.ref_type == 'tag' && 'New release' || inputs.description }}
          draft: false
          prerelease: false
