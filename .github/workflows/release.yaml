name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
        
      - name: Zip output
        run: Compress-Archive -Path ./publish/* -DestinationPath ./MiloMusicPlayer-${{ github.ref_name }}-win-x64.zip

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: MiloMusicPlayer-${{ github.ref_name }}-win-x64
          path: ./MiloMusicPlayer-${{ github.ref_name }}-win-x64.zip

      - name: Create Release (tag runs only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ./MiloMusicPlayer-${{ github.ref_name }}-win-x64.zip
          name: Milo Music Player ${{ github.ref_name }}
          draft: false
          prerelease: false
