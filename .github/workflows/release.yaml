name: Build and Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      description:
        description: 'Release description'
        required: false
        default: 'New release'
      debug:
        description: 'Debug mode (skip release)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag (if needed)
        if: github.event_name == 'workflow_dispatch' && !inputs.debug
        shell: pwsh
        run: |
          git fetch --tags

          if (-not (git tag -l "${{ inputs.tag }}")) {
            Write-Host "Creating tag ${{ inputs.tag }}"
            git tag "${{ inputs.tag }}"
            git push origin "${{ inputs.tag }}"
          } else {
            Write-Host "Tag already exists. Skipping."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish MiloMusicPlayer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create output directory
        run: mkdir -Force ./output

      - name: Zip output
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ inputs.tag }}" }
          Compress-Archive -Path ./publish/* -DestinationPath "./output/MiloMusicPlayer-$tag-win-x64.zip"

      - name: Upload artifacts (debug only)
        if: github.event_name == 'workflow_dispatch' && inputs.debug
        uses: actions/upload-artifact@v4
        with:
          name: MiloMusicPlayer-${{ inputs.tag }}-win-x64
          path: ./output/*.zip

      - name: Create or Update Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.debug)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: Milo Music Player ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          body: ${{ github.ref_type == 'tag' && 'New release' || inputs.description }}
          files: ./output/MiloMusicPlayer-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}-win-x64.zip
          overwrite_files: true
          draft: false
          prerelease: false
